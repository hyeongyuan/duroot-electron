appId: com.duroot.www
productName: Duroot
copyright: Copyright © 2018 Yoshihide Shiono
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
extraResources:
  - from: 'assets'
    to: assets
    filter:
      - '**/*'
  - from: '.env'
    to: '.'
publish:
  - provider: github
    owner: hyeongyuan
    repo: duroot-electron
protocols:
  - name: Duroot
    schemes:
      - duroot
